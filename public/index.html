<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Soil MQTT Monitor</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --card: #151b2c;
      --accent: #00d1b2;
      --text: #e7ecf5;
      --muted: #a9b4c7;
      --danger: #ff5f6d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: radial-gradient(1200px 600px at 20% 0%, #1a2340 0%, var(--bg) 60%);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid #223055;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 6px 0 16px; color: var(--muted); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    input {
      flex: 1;
      background: #0f1424;
      border: 1px solid #263458;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
    }
    button {
      background: #0f1424;
      border: 1px solid #263458;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); color: #02110e; border: none; }
    button.danger { background: var(--danger); border: none; }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      background: #0f1424;
      border: 1px solid #263458;
      border-radius: 10px;
      font-size: 14px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #263458;
      color: var(--muted);
      font-size: 12px;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ESP32 Soil Sensor</h1>
    <p>MQTT over WebSockets (subscribe only).</p>

    <div class="row">
      <input id="host" value="test.mosquitto.org" placeholder="MQTT Host" />
      <input id="port" value="8081" placeholder="WSS Port" />
    </div>
    <div class="row" style="margin-top:10px;">
      <input id="topicSoil" value="khang/esp32/soil" placeholder="Topic soil" />
    </div>
    <div class="row" style="margin-top:10px;">
      <button id="connect" class="primary">Connect</button>
      <button id="disconnect">Disconnect</button>
      <span class="badge" id="connState">disconnected</span>
    </div>

    <div class="status" id="status">Soil: raw=-- pct=--</div>
    <div class="status" id="updated" style="margin-top:8px;">Last update: -</div>
    <div class="status" id="log" style="margin-top:8px;">Log: -</div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    let client = null;
    const el = (id) => document.getElementById(id);

    function log(msg) {
      el("log").textContent = "Log: " + msg;
    }

    function setConnState(state) {
      el("connState").textContent = state;
    }

    function connect() {
      const host = el("host").value.trim();
      const port = el("port").value.trim();
      const url = `wss://${host}:${port}/mqtt`;

      client = mqtt.connect(url, {
        clientId: "web-" + Math.random().toString(16).slice(2)
      });

      client.on("connect", () => {
        setConnState("connected");
        log("connected to " + url);
        client.subscribe(el("topicSoil").value.trim());
      });

      client.on("message", (topic, message) => {
        const text = message.toString();
        try {
          const data = JSON.parse(text);
          const raw = typeof data.raw === "number" ? data.raw : "--";
          const pct = typeof data.pct === "number" ? data.pct : "--";
          el("status").textContent = `Soil: raw=${raw} pct=${pct}`;
        } catch (e) {
          el("status").textContent = `Soil: ${text}`;
        }
        el("updated").textContent = "Last update: " + new Date().toLocaleTimeString();
      });

      client.on("error", (err) => {
        setConnState("error");
        log(err.message || err);
      });

      client.on("close", () => {
        setConnState("disconnected");
      });
    }

    function disconnect() {
      if (client) {
        client.end(true);
        client = null;
      }
      setConnState("disconnected");
      log("disconnected");
    }

    el("connect").onclick = connect;
    el("disconnect").onclick = disconnect;
  </script>
</body>
</html>
